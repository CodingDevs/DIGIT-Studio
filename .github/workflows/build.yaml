name: Build Pipeline
run-name: Build ${{ github.event.inputs.service_folder }}-${{ github.event.inputs.service }}

on:
  workflow_dispatch:
    inputs:
      service_folder:
        description: 'Folder prefix for the service'
        required: true
        type: choice
        options:
          - studio-services
          - studio-ui
          - utilities
        default: studio-services
      service:
        description: 'Name of the service to build and deploy'
        required: true
        type: choice
        options:
          - public-service
          - digit-studio
        default: public-service

env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_ACCESS_TOKEN }}

jobs:
  resolve-config:
    name: Resolve config for ${{ github.event.inputs.service_folder }} / ${{ github.event.inputs.service }}
    runs-on: ubuntu-latest
    outputs:
      work_dir:    ${{ steps.setenv.outputs.work_dir }}
      image_name:  ${{ steps.setenv.outputs.image_name }}
      dockerfile:  ${{ steps.setenv.outputs.dockerfile }}
      tag:         ${{ steps.tag.outputs.tag }}
      folder_exists: ${{ steps.check-db.outputs.folder_exists }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install yq
        run: |
          VERSION="4.30.8"
          URL="https://github.com/mikefarah/yq/releases/download/v${VERSION}/yq_linux_amd64"
          sudo curl -sSL "$URL" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Resolve build config
        id: setenv
        run: |
          SERVICE_FOLDER="${{ github.event.inputs.service_folder }}"
          SERVICE="${{ github.event.inputs.service }}"

          # fetch the matching config block and build entry
          # Look for config entries that contain the service folder name
          CONFIG_JSON=$(yq eval -o=json ".config[] | select(.name | contains(\"$SERVICE_FOLDER\"))" build/build-config.yml)
          if [ -z "$CONFIG_JSON" ] || [ "$CONFIG_JSON" = "null" ]; then
            echo "No config for folder '$SERVICE_FOLDER'" >&2
            exit 1
          fi
          BUILD_ENTRY=$(echo "$CONFIG_JSON" | jq -c ".build[] | select(.\"image-name\"==\"$SERVICE\")")
          if [ -z "$BUILD_ENTRY" ] || [ "$BUILD_ENTRY" = "null" ]; then
            echo "No build entry for service '$SERVICE' in '$SERVICE_FOLDER'" >&2
            exit 1
          fi

          # extract fields, with default Dockerfile if unspecified
          WORK_DIR=$(echo "$BUILD_ENTRY" | jq -r '.["work-dir"] // ""')
          IMAGE_NAME=$(echo "$BUILD_ENTRY" | jq -r '.["image-name"]')
          DOCKERFILE=$(echo "$BUILD_ENTRY" | jq -r '.dockerfile // empty')
          if [ -z "$DOCKERFILE" ]; then
            DOCKERFILE="$WORK_DIR/Dockerfile"
          fi

          # export for subsequent jobs
          echo "work_dir=$WORK_DIR"      >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME"  >> $GITHUB_OUTPUT
          echo "dockerfile=$DOCKERFILE"  >> $GITHUB_OUTPUT
          echo "SERVICE_WORK_DIR=$WORK_DIR"     >> $GITHUB_ENV
          echo "SERVICE_IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "SERVICE_DOCKERFILE=$DOCKERFILE" >> $GITHUB_ENV

      - name: Check if DB migrations folder exists
        id: check-db
        run: |
          if [ -d "${{ env.SERVICE_WORK_DIR }}/scripts/migration" ]; then
            echo "folder_exists=true" >> $GITHUB_OUTPUT
          else
            echo "folder_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate next Docker tag
        id: tag
        run: |
          set -euxo pipefail
          BRANCH="${GITHUB_REF##*/}"
          COMMIT_HASH=$(git rev-parse --short HEAD)
          SERVICE_NAME="${{ env.SERVICE_IMAGE_NAME }}"

          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${DOCKER_USERNAME}\", \"password\": \"${DOCKER_PASSWORD}\"}" \
            | jq -r .token)

          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/${SERVICE_NAME}/")

          if [ "$HTTP_CODE" -ne 200 ]; then
            NEXT_TAG="${BRANCH}-${COMMIT_HASH}"
          else
            EXISTING=$(curl -s -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/${DOCKER_USERNAME}/${SERVICE_NAME}/tags?page_size=100" \
              | jq -r '.results[].name')
            LATEST=$(echo "$EXISTING" | grep "^${BRANCH}-${COMMIT_HASH}" || true | sort -V | tail -n1)
            NEXT_TAG="${LATEST:-${BRANCH}-${COMMIT_HASH}}"
          fi

          echo "tag=$NEXT_TAG"  >> $GITHUB_OUTPUT
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV

  build-matrix:
    name: Build & push (${matrix.arch})
    needs: resolve-config
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      amd64_app_digest: ${{ steps.digest_app_amd64.outputs.digest }}
      arm64_app_digest: ${{ steps.digest_app_arm64.outputs.digest }}
      amd64_db_digest:  ${{ steps.digest_db_amd64.outputs.digest }}
      arm64_db_digest:  ${{ steps.digest_db_arm64.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ github.event.inputs.service_folder }}-${{ github.event.inputs.service }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ github.event.inputs.service_folder }}-${{ github.event.inputs.service }}-

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build & push application image
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg WORK_DIR=${{ needs.resolve-config.outputs.work_dir }} \
            --file ${{ needs.resolve-config.outputs.dockerfile }} \
            --tag ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-${{ matrix.arch }} \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --push \
            --iidfile app_digest.txt \
            .

      - name: Export app digest (amd64)
        if: matrix.arch == 'amd64'
        id: digest_app_amd64
        run: |
          digest=$(docker buildx imagetools inspect \
            ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-${{ matrix.arch }} \
            --format '{{json .}}' | jq -r '.manifest.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')
          echo "digest=$digest" >> $GITHUB_OUTPUT

      - name: Export app digest (arm64)
        if: matrix.arch == 'arm64'
        id: digest_app_arm64
        run: |
          digest=$(docker buildx imagetools inspect \
            ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-${{ matrix.arch }} \
            --format '{{json .}}' | jq -r '.manifest.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest')
          echo "digest=$digest" >> $GITHUB_OUTPUT

      - name: Build & push DB image
        if: needs.resolve-config.outputs.folder_exists == 'true'
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg WORK_DIR=${{ needs.resolve-config.outputs.work_dir }} \
            --file ${{ needs.resolve-config.outputs.work_dir }}/src/main/resources/db/Dockerfile \
            --tag ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }}-${{ matrix.arch }} \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --push \
            --iidfile db_digest.txt \
            .

      - name: Export DB digest (amd64)
        if: matrix.arch == 'amd64' && needs.resolve-config.outputs.folder_exists == 'true'
        id: digest_db_amd64
        run: |
          digest=$(docker buildx imagetools inspect \
            ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }}-${{ matrix.arch }} \
            --format '{{json .}}' | jq -r '.manifest.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest')
          echo "digest=$digest" >> $GITHUB_OUTPUT

      - name: Export DB digest (arm64)
        if: matrix.arch == 'arm64' && needs.resolve-config.outputs.folder_exists == 'true'
        id: digest_db_arm64
        run: |
          digest=$(docker buildx imagetools.inspect \
            ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }}-${{ matrix.arch }} \
            --format '{{json .}}' | jq -r '.manifest.manifests[] | select(.platform.architecture=="arm64" and .platform.os=="linux") | .digest')
          echo "digest=$digest" >> $GITHUB_OUTPUT

  create-manifest:
    name: Create and push multi-arch manifests
    needs: [build-matrix, resolve-config]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Create & push application manifest
        run: |
          docker manifest create ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }} \
            --amend ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}@${{ needs.build-matrix.outputs.amd64_app_digest }} \
            --amend ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}@${{ needs.build-matrix.outputs.arm64_app_digest }}
          docker manifest push ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}

      - name: Cleanup local app refs
        run: |
          docker manifest rm ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-amd64 || true
          docker manifest rm ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-arm64 || true

      - name: Create & push DB manifest
        if: needs.resolve-config.outputs.folder_exists == 'true'
        run: |
          docker manifest create ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }} \
            --amend ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db@${{ needs.build-matrix.outputs.amd64_db_digest }} \
            --amend ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db@${{ needs.build-matrix.outputs.arm64_db_digest }}
          docker manifest push ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }}

      - name: Cleanup local DB refs
        if: needs.resolve-config.outputs.folder_exists == 'true'
        run: |
          docker manifest rm ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }}-amd64 || true
          docker manifest rm ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }}-arm64 || true

      - name: Add summary
        run: |
          echo "- App Image: ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }} (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.resolve-config.outputs.folder_exists }}" = "true" ]; then
            echo "- DB Image: ${DOCKER_USERNAME}/${{ needs.resolve-config.outputs.image_name }}-db:${{ needs.resolve-config.outputs.tag }} (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
          fi
