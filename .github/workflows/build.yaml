name: Build Pipeline
run-name: Build ${{ github.event.inputs.service_folder }}/${{ github.event.inputs.service }}

on:
  workflow_dispatch:
    inputs:
      service_folder:
        description: 'Folder prefix for the service'
        required: true
        type: choice
        options:
          - studio-services
          - studio-ui
          - utilities
        default: studio-services
      service:
        description: 'Name of the service to build and deploy'
        required: true
        type: choice
        options:
          - public-service
          - studio-pdf
          - digit-studio
        default: public-service

env:
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_ACCESS_TOKEN }}

jobs:
  resolve-config:
    name: ▶ Resolve config
    runs-on: ubuntu-latest
    outputs:
      work_dir:    ${{ steps.pick.outputs.work_dir }}
      dockerfile:  ${{ steps.pick.outputs.dockerfile }}
      image_name:  ${{ steps.pick.outputs.image_name }}
      tag:         ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install yq
        run: |
          VERSION="4.30.8"
          URL="https://github.com/mikefarah/yq/releases/download/v${VERSION}/yq_linux_amd64"
          sudo curl -sSL "$URL" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Pick Dockerfile & Work-dir
        id: pick
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          DEFAULT_DF="build/maven/Dockerfile"

          DF=$(yq eval ".config[].build[] | select(.\"image-name\" == \"${SERVICE}\") | .dockerfile // \"\"" build/build-config.yml)
          WD=$(yq eval ".config[].build[] | select(.\"image-name\" == \"${SERVICE}\") | .\"work-dir\" // \"\"" build/build-config.yml)

          if [ -z "$DF" ] || [ "$DF" = "null" ]; then
            echo "Using default Dockerfile: $DEFAULT_DF"
            DF="$DEFAULT_DF"
          else
            echo "Found Dockerfile: $DF"
          fi

          echo "work_dir=$WD"         >> "$GITHUB_OUTPUT"
          echo "dockerfile=$DF"       >> "$GITHUB_OUTPUT"
          echo "image_name=$SERVICE"  >> "$GITHUB_OUTPUT"
          echo "WORK_DIR=$WD"         >> "$GITHUB_ENV"
          echo "DOCKERFILE=$DF"       >> "$GITHUB_ENV"

      - name: Generate Next Tag
        id: tag
        run: |
          set -euxo pipefail
          BRANCH="${GITHUB_REF##*/}"
          SHORT_HASH=$(git rev-parse --short HEAD)

          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$DOCKER_USERNAME\",\"password\":\"$DOCKER_PASSWORD\"}" \
            | jq -r .token)

          IMAGE="${{ steps.pick.outputs.image_name }}"
          HTTP=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/$DOCKER_USERNAME/$IMAGE/")

          if [ "$HTTP" -ne 200 ]; then
            NEXT="$BRANCH-$SHORT_HASH"
          else
            EXIST=$(curl -s -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/$DOCKER_USERNAME/$IMAGE/tags?page_size=100" \
              | jq -r '.results[].name')
            LATEST=$(echo "$EXIST" | grep "^${BRANCH}-${SHORT_HASH}" || true | sort -V | tail -n1)
            NEXT="${LATEST:-$BRANCH-$SHORT_HASH}"
          fi

          echo "tag=$NEXT"       >> "$GITHUB_OUTPUT"
          echo "NEXT_TAG=$NEXT"  >> "$GITHUB_ENV"

  build-matrix:
    name: ▶ Build images (${{ matrix.arch }})
    needs: resolve-config
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      amd64_digest: ${{ steps.export-amd64.outputs.digest }}
      arm64_digest: ${{ steps.export-arm64.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Buildx
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ github.event.inputs.service }}-${{ github.ref_name }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ github.event.inputs.service }}-

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build & Push (${{ matrix.arch }})
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg WORK_DIR="${{ needs.resolve-config.outputs.work_dir }}" \
            --file "${{ needs.resolve-config.outputs.dockerfile }}" \
            --tag egovio/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-${{ matrix.arch }} \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --push \
            --iidfile=out-${{ matrix.arch }}.json \
            .

      - name: Export amd64 digest
        if: matrix.arch == 'amd64'
        id: export-amd64
        run: |
          digest=$(jq -r '.aux[].digest' out-amd64.json)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Export arm64 digest
        if: matrix.arch == 'arm64'
        id: export-arm64
        run: |
          digest=$(jq -r '.aux[].digest' out-arm64.json)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  create-manifest:
    name: ▶ Create & Push Manifest
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Create manifest
        run: |
          IMAGE=egovio/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}
          docker manifest create $IMAGE \
            --amend $IMAGE@${{ needs.build-matrix.outputs.amd64_digest }} \
            --amend $IMAGE@${{ needs.build-matrix.outputs.arm64_digest }}
          docker manifest push $IMAGE

      - name: Cleanup local refs
        run: |
          docker manifest rm egovio/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-amd64 || true
          docker manifest rm egovio/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}-arm64 || true

      - name: Summary
        run: |
          echo "- Image: egovio/${{ needs.resolve-config.outputs.image_name }}:${{ needs.resolve-config.outputs.tag }}"  >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: amd64, arm64"                                                    >> $GITHUB_STEP_SUMMARY
