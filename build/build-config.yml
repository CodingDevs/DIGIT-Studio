#
# config:
# -   name: < Name of the job, foo/bar would create job named bar inside folder foo >
#     build:
#     - work-dir: < Working directory of the app to be built >
#       dockerfile: < Path to the dockerfile, optional, assumes dockerfile in working directory if not provided >
#       image-name: < Docker image name  >
# -
# -
#
# config:
# -   name: < Name of the job, foo/bar would create job named bar inside folder foo >
#     build:
#     - work-dir: < Working directory of the app to be built >
#       dockerfile: < Path to the dockerfile, optional, assumes dockerfile in working directory if not provided >
#       image-name: < Docker image name  >
# -
# -
config:

  - name: "builds/DIGIT-Studio/core-services/egov-workflow-v2"
    build:
      - work-dir: "core-services/egov-workflow-v2"
        image-name: "egov-workflow-v2"
        dockerfile: "build/maven-java17/Dockerfile"
      - work-dir: "core-services/egov-workflow-v2/src/main/resources/db"
        image-name: "egov-workflow-v2-db"

  - name: "builds/DIGIT-Studio/core-services/inbox"
    build:
      - work-dir: "core-services/inbox"
        image-name: "inbox"
        dockerfile: "build/maven-java17/Dockerfile"

  - name: "builds/DIGIT-Studio/core-services/pdf-service"
    build:
      - work-dir: "core-services/pdf-service"
        image-name: "pdf-service"
      - work-dir: "core-services/pdf-service/migration"
        image-name: "pdf-service-db"

  - name: "builds/DIGIT-Studio/core-services/individual"
    build:
      - work-dir: "core-services/individual"
        image-name: "individual"
        dockerfile: "build/maven-java17/Dockerfile"
      - work-dir: "core-services/individual/src/main/resources/db"
        image-name: "individual-db"

  - name: "builds/DIGIT-Studio/core-services/organisation"
    build:
      - work-dir: "core-services/organisation"
        dockerfile: "build/maven-java17/Dockerfile"
        image-name: "organisation"
      - work-dir: "core-services/organisation/src/main/resources/db"
        image-name: "organisation-db"

  - name: "builds/DIGIT-Studio/core-services/service-request"
    build:
      - work-dir: "core-services/service-request"
        image-name: "service-request"
        dockerfile: "build/maven-java17/Dockerfile"
      - work-dir: "core-services/service-request/src/main/resources/db"
        image-name: "service-request-db"

  # Business Services
  - name: "builds/DIGIT-Studio/studio-services/public-service"
    build:
      - work-dir: "studio-services/public-service"
        image-name: "public-service"
        dockerfile: "build/maven/Dockerfile"
      - work-dir: "studio-services/public-service/scripts/migration"
        image-name: "public-service-db"
        
  - name: "builds/DIGIT-Studio/studio-ui/digit-studio"
    build:
      - work-dir: "frontend/"
        dockerfile: "frontend/web/docker/Dockerfile"
        image-name: "digit-studio"

# utilities
  - name: "builds/DIGIT-Studio/utilities/studio-pdf"
    build:
      - work-dir: "utilities/studio-pdf"
        image-name: "studio-pdf"
